<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta de Acolhimento</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           CONFIGURAÇÕES GERAIS E ROLETA
           ========================================= */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #121212; 
            font-family: 'Roboto', sans-serif;
            color: #ffffff;
            overflow: hidden; 
        }

        .wheel-container {
            position: relative;
            width: 95vmin;  
            height: 95vmin; 
        }

        .pointer-wrapper {
            position: absolute;
            top: -3vmin; 
            left: 50%;
            transform: translateX(-50%); 
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 2.5vmin solid transparent;
            border-right: 2.5vmin solid transparent;
            border-top: 5vmin solid #e53935; 
            transform-origin: top center; 
        }

        @keyframes tickRight {
            0% { transform: rotate(0deg); }
            30% { transform: rotate(25deg); } 
            100% { transform: rotate(0deg); }
        }
        @keyframes tickLeft {
            0% { transform: rotate(0deg); }
            30% { transform: rotate(-25deg); } 
            100% { transform: rotate(0deg); }
        }

        canvas {
            display: block; 
            width: 100%;
            height: 100%;
            border-radius: 50%; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            cursor: grab; 
        }

        canvas:active { cursor: grabbing; }

        /* =========================================
           BOTÕES FLUTUANTES (GIRAR E ADMIN)
           ========================================= */
        .fab-button {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 64px;
            height: 64px;
            background-color: #00897B;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            cursor: pointer;
            border: none;
            color: white;
            transition: transform 0.2s, background-color 0.2s;
            z-index: 20;
        }

        .fab-button:hover:not(:disabled) {
            background-color: #00796B;
            transform: scale(1.05);
        }
        .fab-button:active:not(:disabled) { transform: scale(0.95); }
        .fab-button:disabled { background-color: #333333; color: #757575; cursor: not-allowed; }

        .admin-btn {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 48px;
            height: 48px;
            background-color: transparent;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: #555555; 
            transition: color 0.2s;
            z-index: 20;
        }
        .admin-btn:hover { color: #aaaaaa; }

        /* =========================================
           MODAIS (RESULTADO, LOGIN E ADMIN)
           ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(8px); 
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background-color: #1e1e1e;
            border: 1px solid #333333;
            border-radius: 24px; 
            padding: 40px; 
            text-align: center;
            min-width: 40vw; 
            max-width: 90vw;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            transform: scale(0.8); 
            transition: transform 0.3s;
            position: relative;
        }

        .modal-overlay.active .modal-content { transform: scale(1); }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            background: none;
            border: none;
            color: #aaaaaa;
            font-size: 32px;
            cursor: pointer;
            line-height: 1;
        }
        .close-modal:hover { color: #ffffff; }

        .modal-label {
            font-size: 18px;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            display: block;
        }

        .modal-topic {
            font-size: 64px; 
            font-weight: 700;
            color: #80CBC4;
            margin-bottom: 40px; 
            line-height: 1.1;
        }

        .btn {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }
        .btn-danger { background-color: transparent; color: #e53935; border: 1px solid #e53935; }
        .btn-danger:hover { background-color: rgba(229, 57, 53, 0.1); }
        .btn-primary { background-color: #00897B; color: white; width: 100%; margin-top: 20px; }
        .btn-primary:hover { background-color: #00796B; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #aaaaaa; font-size: 14px; }
        .form-control {
            width: 100%;
            padding: 12px;
            background-color: #121212;
            border: 1px solid #333333;
            border-radius: 6px;
            color: white;
            font-family: 'Roboto', sans-serif;
            box-sizing: border-box;
        }
        textarea.form-control { resize: vertical; min-height: 120px; }

        @media (max-width: 800px) {
            .fab-button { bottom: 20px; right: 20px; width: 56px; height: 56px; }
            .admin-btn { bottom: 20px; left: 20px; }
            .modal-topic { font-size: 40px; } 
        }
    </style>
</head>
<body>

    <div class="wheel-container">
        <div class="pointer-wrapper"><div class="pointer" id="pointer"></div></div>
        <canvas id="wheelCanvas" width="1200" height="1200"></canvas>
    </div>
    
    <button id="spinBtn" class="fab-button" title="Girar Roleta">
        <svg fill="currentColor" viewBox="0 0 24 24" width="32" height="32">
            <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
        </svg>
    </button>

    <button id="openAuthBtn" class="admin-btn" title="Área Restrita">
        <svg fill="currentColor" viewBox="0 0 24 24" width="24" height="24">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
        </svg>
    </button>

    <div class="modal-overlay" id="resultModal">
        <div class="modal-content">
            <button class="close-modal" id="closeResultBtn">&times;</button>
            <span class="modal-label">Tópico Sorteado</span>
            <div class="modal-topic" id="modalTopicName">Carregando...</div>
            <button class="btn btn-danger" id="modalRemoveBtn">Remover Tópico da Dinâmica</button>
        </div>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-content" style="max-width: 400px; min-width: 300px;">
            <button class="close-modal" id="closeAuthBtn">&times;</button>
            <span class="modal-label" style="color: #00897B;">Acesso Restrito</span>
            <form id="loginForm">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="emailInput" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="passwordInput" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Entrar no Sistema</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="adminModal">
        <div class="modal-content" style="text-align: left; max-width: 600px;">
            <button class="close-modal" id="closeAdminBtn">&times;</button>
            <span class="modal-label" style="color: #00897B; text-align: center;">Painel de Controle</span>
            <p style="color: #aaaaaa; font-size: 14px; text-align: center;">Adicione um item por linha.<br>Você pode digitar nomes de cores (Azul, Amarelo, Rosa, Verde Claro...) ou códigos HEX.</p>
            
            <div class="form-group">
                <label>Tópicos da Dinâmica</label>
                <textarea id="topicsInput" class="form-control"></textarea>
            </div>
            
            <div class="form-group">
                <label>Cores da Roleta</label>
                <textarea id="colorsInput" class="form-control"></textarea>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button id="saveConfigBtn" class="btn btn-primary">Salvar no Servidor</button>
                <button id="logoutBtn" class="btn btn-danger" style="margin-top: 20px;">Sair</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDu4-isXrUknQltBmQGswaqifh5z83Sntc",
            authDomain: "roletausf.firebaseapp.com",
            projectId: "roletausf",
            storageBucket: "roletausf.firebasestorage.app",
            messagingSenderId: "937121501531",
            appId: "1:937121501531:web:b7180a71e57223b65b4a7e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const pointer = document.getElementById("pointer");
        
        let topics = [];
        let colors = []; 
        let lastSelectedIndex = null; 
        let currentRotation = 0; 
        const CANVAS_SIZE = 1200; 
        const CENTER = CANVAS_SIZE / 2; 
        const RADIUS = 600; 

        // Dicionário para mapear nomes reais em português para os códigos hexadecimais corretos e bonitos
        const colorDictionary = {
            "azul": "#90CAF9",
            "azul claro": "#B3E5FC",
            "azul escuro": "#1976D2",
            "verde": "#A5D6A7",
            "verde claro": "#C8E6C9",
            "verde agua": "#80CBC4",
            "amarelo": "#FFF59D",
            "laranja": "#FFCC80",
            "rosa": "#F48FB1",
            "roxo": "#CE93D8",
            "lilas": "#E1BEE7",
            "vermelho": "#EF9A9A",
            "cinza": "#B0BEC5",
            "marrom": "#BCAAA4"
        };

        const configDocRef = doc(db, "roleta", "config");

        onSnapshot(configDocRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                topics = data.topics || [];
                colors = data.colors || ["azul", "amarelo", "laranja", "verde", "roxo"];
                drawWheel(); 
            } else {
                const defaultData = {
                    topics: ["Corpo e Saúde", "Respiro e Lazer", "Rede de Apoio", "Identidade", "Mundo Interno", "Futuro"],
                    colors: ["verde agua", "amarelo", "laranja", "verde", "roxo", "azul"]
                };
                topics = defaultData.topics;
                colors = defaultData.colors;
                drawWheel();
            }
        });

        function drawWheel() {
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            
            if (topics.length === 0) {
                ctx.beginPath();
                ctx.arc(CENTER, CENTER, RADIUS, 0, 2 * Math.PI);
                ctx.fillStyle = "#1e1e1e";
                ctx.fill();
                return;
            }

            // Traduz a lista de cores do painel (nomes) para Códigos Hexadecimais
            let parsedColors = colors.map(c => {
                // Remove acentos e joga pra minúscula para reconhecer "Verde Água" como "verde agua"
                let key = c.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, "");
                return colorDictionary[key] || c; // Se não achar o nome, usa como HEX ou CSS padrão
            });
            
            if(parsedColors.length === 0) parsedColors = ["#80CBC4"]; // Fallback de emergência

            // LÓGICA ANTI-REPETIÇÃO: Escolhe a cor garantindo que não seja igual a anterior
            let assignedColors = [];
            for (let i = 0; i < topics.length; i++) {
                let chosenColor = parsedColors[i % parsedColors.length];

                // Checa colisão com a fatia anterior
                if (i > 0 && chosenColor === assignedColors[i - 1]) {
                    let safeColor = parsedColors.find(c => c !== assignedColors[i - 1]);
                    if (safeColor) chosenColor = safeColor;
                }
                
                // Checa colisão da ÚLTIMA fatia com a PRIMEIRA (para fechar o círculo perfeitamente)
                if (i === topics.length - 1 && topics.length > 1) {
                    if (chosenColor === assignedColors[0] || chosenColor === assignedColors[i - 1]) {
                        let safeColor = parsedColors.find(c => c !== assignedColors[0] && c !== assignedColors[i - 1]);
                        if (safeColor) {
                            chosenColor = safeColor;
                        } else {
                            chosenColor = "#B0BEC5"; // Coringa cinza caso as cores do painel esgotem as combinações
                        }
                    }
                }
                assignedColors.push(chosenColor);
            }

            const arc = 2 * Math.PI / topics.length;

            for (let i = 0; i < topics.length; i++) {
                const angle = i * arc; 
                ctx.beginPath();
                ctx.arc(CENTER, CENTER, RADIUS, angle, angle + arc, false);
                ctx.lineTo(CENTER, CENTER);
                ctx.fillStyle = assignedColors[i]; // Usa a cor segura calculada acima
                ctx.fill();
                ctx.save();

                ctx.fillStyle = "#212121";
                ctx.font = "bold 38px 'Roboto', sans-serif"; // Fonte ligeiramente menor para caber textos médios
                ctx.textBaseline = "middle"; // Ajuda a centralizar o bloco de texto
                
                ctx.translate(
                    CENTER + Math.cos(angle + arc / 2) * 360, 
                    CENTER + Math.sin(angle + arc / 2) * 360
                );
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "center";
                
                // LÓGICA DE QUEBRA DE LINHA AUTOMÁTICA
                const words = topics[i].split(' ');
                let lines = [];
                let currentLine = words[0] || "";

                for (let w = 1; w < words.length; w++) {
                    let word = words[w];
                    // Mede se a linha atual + a próxima palavra cabem no espaço de 320px da fatia
                    let width = ctx.measureText(currentLine + " " + word).width;
                    if (width < 320) {
                        currentLine += " " + word;
                    } else {
                        lines.push(currentLine);
                        currentLine = word;
                    }
                }
                if (currentLine) lines.push(currentLine);

                // Desenha as linhas perfeitamente centralizadas e espaçadas
                let lineHeight = 46;
                let startY = -(lines.length - 1) * lineHeight / 2;

                for(let j=0; j<lines.length; j++) {
                    ctx.fillText(lines[j], 0, startY + (j * lineHeight));
                }
                
                ctx.restore();
            }

            // Pinos na borda
            ctx.fillStyle = "#ffffff";
            ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
            ctx.shadowBlur = 6;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            
            for (let i = 0; i < topics.length; i++) {
                const angle = i * arc; 
                ctx.beginPath();
                ctx.arc(
                    CENTER + Math.cos(angle) * 570, 
                    CENTER + Math.sin(angle) * 570, 
                    12, 
                    0, 2 * Math.PI
                );
                ctx.fill();
            }
            ctx.shadowColor = "transparent";

            // Circulo central
            ctx.beginPath();
            ctx.arc(CENTER, CENTER, 90, 0, 2 * Math.PI, false);
            ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
            ctx.shadowBlur = 15;
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            ctx.shadowColor = "transparent";
        }

        const resultModal = document.getElementById("resultModal");
        const closeResultBtn = document.getElementById("closeResultBtn");
        const modalTopicName = document.getElementById("modalTopicName");
        const modalRemoveBtn = document.getElementById("modalRemoveBtn");

        function showResultModal(index) {
            lastSelectedIndex = index;
            modalTopicName.textContent = topics[index];
            resultModal.classList.add("active"); 
            spinBtn.disabled = false; 
        }

        closeResultBtn.addEventListener("click", () => resultModal.classList.remove("active"));

        modalRemoveBtn.addEventListener("click", async () => {
            if (lastSelectedIndex !== null) {
                const newTopics = [...topics];
                // Perceba que não removemos a cor aqui. O sistema apenas redesenha e re-escolhe as cores baseado no que sobrou, evitando que a paleta do usuário encurte ou quebre o layout
                newTopics.splice(lastSelectedIndex, 1);
                
                resultModal.classList.remove("active");
                
                try {
                    await setDoc(configDocRef, { topics: newTopics, colors: colors });
                    lastSelectedIndex = null;
                } catch (error) {
                    topics.splice(lastSelectedIndex, 1);
                    lastSelectedIndex = null;
                    drawWheel();
                }

                if (topics.length === 0) {
                    spinBtn.disabled = true;
                    setTimeout(() => alert("Todos os temas foram discutidos! A dinâmica acabou."), 500);
                }
            }
        });

        function determineWinner() {
            let normalizedRotation = currentRotation % 360;
            if (normalizedRotation < 0) normalizedRotation += 360;

            const sliceAngle = 360 / topics.length;
            const relativeTop = (270 - normalizedRotation + 360) % 360;
            const selectedIndex = Math.floor(relativeTop / sliceAngle);

            showResultModal(selectedIndex);
        }

        function lockControls() { spinBtn.disabled = true; }

        let isSpinning = false; 
        let lastPhase = null;

        function checkPegCollision() {
            if (!isSpinning || topics.length === 0) return;

            const style = window.getComputedStyle(canvas);
            const matrix = new DOMMatrix(style.transform);
            let angle = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
            if (angle < 0) angle += 360; 

            const sliceAngle = 360 / topics.length;
            let phase = (angle - 270 + 360) % sliceAngle;
            if (phase < 0) phase += sliceAngle;

            if (lastPhase !== null) {
                let delta = phase - lastPhase;
                if (Math.abs(delta) > sliceAngle / 2) {
                    let direction = delta > 0 ? "tickLeft" : "tickRight";
                    triggerPointerTick(direction);
                }
            }
            lastPhase = phase;
            requestAnimationFrame(checkPegCollision); 
        }

        function triggerPointerTick(animationName) {
            pointer.style.animation = 'none'; 
            pointer.offsetHeight; 
            pointer.style.animation = `${animationName} 0.15s ease-out`; 
        }

        let isDragging = false;
        let lastAngle = 0;
        let velocity = 0;
        let lastTime = 0;

        function getAngle(e) {
            const rect = canvas.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
        }

        function startDrag(e) {
            if (topics.length === 0 || spinBtn.disabled || e.target.closest('.modal-overlay')) return;
            isDragging = true;
            canvas.style.transition = 'none'; 
            lastAngle = getAngle(e);
            lastTime = performance.now();
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault(); 
            const currentMouseAngle = getAngle(e);
            let delta = currentMouseAngle - lastAngle;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;
            currentRotation += delta;
            canvas.style.transform = `rotate(${currentRotation}deg)`; 
            
            const now = performance.now();
            const timeDelta = now - lastTime;
            if (timeDelta > 0) velocity = delta / timeDelta;
            
            lastAngle = currentMouseAngle;
            lastTime = now;
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            lockControls();

            let momentum = velocity * 8000; 
            if (Math.abs(momentum) < 1500) {
                momentum = (momentum >= 0 ? 1 : -1) * (Math.floor(Math.random() * 1500) + 1500);
            }

            currentRotation += momentum; 
            canvas.style.transition = 'transform 3s cubic-bezier(0.15, 0.85, 0.35, 1)'; 
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            isSpinning = true;
            lastPhase = null;
            requestAnimationFrame(checkPegCollision);

            setTimeout(() => {
                isSpinning = false;
                determineWinner();
            }, 3000);
        }

        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', drag);
        window.addEventListener('mouseup', endDrag);

        canvas.addEventListener('touchstart', startDrag, {passive: false});
        window.addEventListener('touchmove', drag, {passive: false});
        window.addEventListener('touchend', endDrag);

        spinBtn.addEventListener("click", () => {
            if (topics.length === 0) return;
            lockControls();
            const randomDegree = Math.floor(Math.random() * 3600) + 1800;
            currentRotation += randomDegree;
            canvas.style.transition = "transform 4s cubic-bezier(0.25, 0.1, 0.25, 1)";
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            isSpinning = true;
            lastPhase = null;
            requestAnimationFrame(checkPegCollision);
            setTimeout(() => {
                isSpinning = false;
                determineWinner();
            }, 4000); 
        });

        const authModal = document.getElementById("authModal");
        const adminModal = document.getElementById("adminModal");
        const openAuthBtn = document.getElementById("openAuthBtn");
        const closeAuthBtn = document.getElementById("closeAuthBtn");
        const closeAdminBtn = document.getElementById("closeAdminBtn");
        
        const loginForm = document.getElementById("loginForm");
        const emailInput = document.getElementById("emailInput");
        const passwordInput = document.getElementById("passwordInput");
        
        const topicsInput = document.getElementById("topicsInput");
        const colorsInput = document.getElementById("colorsInput");
        const saveConfigBtn = document.getElementById("saveConfigBtn");
        const logoutBtn = document.getElementById("logoutBtn");

        openAuthBtn.addEventListener("click", () => {
            if (auth.currentUser) {
                topicsInput.value = topics.join("\n");
                colorsInput.value = colors.join("\n");
                adminModal.classList.add("active");
            } else {
                authModal.classList.add("active");
            }
        });

        closeAuthBtn.addEventListener("click", () => authModal.classList.remove("active"));
        closeAdminBtn.addEventListener("click", () => adminModal.classList.remove("active"));

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
                authModal.classList.remove("active");
                loginForm.reset();
                topicsInput.value = topics.join("\n");
                colorsInput.value = colors.join("\n");
                adminModal.classList.add("active");
            } catch (error) {
                alert("Erro no login. Verifique o e-mail e a senha.");
            }
        });

        saveConfigBtn.addEventListener("click", async () => {
            const newTopics = topicsInput.value.split("\n").filter(t => t.trim() !== "");
            const newColors = colorsInput.value.split("\n").filter(c => c.trim() !== "");
            
            if(newTopics.length === 0 || newColors.length === 0) {
                alert("Você precisa inserir ao menos um tópico e uma cor.");
                return;
            }

            saveConfigBtn.textContent = "Salvando...";
            saveConfigBtn.disabled = true;

            try {
                await setDoc(configDocRef, {
                    topics: newTopics,
                    colors: newColors
                });
                adminModal.classList.remove("active");
            } catch (error) {
                alert("Erro ao salvar no servidor. Verifique sua conexão e permissões.");
            } finally {
                saveConfigBtn.textContent = "Salvar no Servidor";
                saveConfigBtn.disabled = false;
            }
        });

        logoutBtn.addEventListener("click", async () => {
            await signOut(auth);
            adminModal.classList.remove("active");
            alert("Você saiu do painel de controle.");
        });

    </script>
</body>
</html>
